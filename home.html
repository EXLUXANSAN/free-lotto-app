<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무료 나눔 로또 - 메인 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            --gold-light: #FFD700;
            --gold-dark: #FF8C00;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(18, 18, 18, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at top right, rgba(255, 215, 0, 0.05), transparent 40%),
                radial-gradient(circle at bottom left, rgba(255, 140, 0, 0.05), transparent 40%);
            /* Prevent scrolling on body, allow in container */
            overflow: hidden;
        }

        /* Mobile Container for testing & desktop view */
        .app-container {
            width: 100%;
            max-width: 480px; /* Suitable for mobile testing (320px ~ 480px) */
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        
        /* Hide scrollbar for standard app feel */
        .app-container::-webkit-scrollbar {
            display: none;
        }
        .app-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-logo::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gold-gradient);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        .header-points {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-points span {
            color: var(--gold-light);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 10px 24px 100px; /* 100px bottom padding for nav bar */
        }

        /* HERO CARD (Expected Prize) */
        .hero-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .hero-card::after {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .round-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold-light);
            font-size: 13px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .prize-amount {
            font-size: 38px;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        /* COUNTDOWN */
        .countdown-wrapper {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-label {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .countdown-timer {
            display: flex;
            gap: 12px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-val {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            width: 44px;
            height: 48px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .time-unit {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* PREVIOUS ROUND RESULTS */
        .section-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .section-title span {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .prev-result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .ball-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .lotto-ball {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Lotto Ball Colors (Korean standard roughly) */
        .ball-yellow { background: linear-gradient(135deg, #fbc400, #e6a000); }
        .ball-blue { background: linear-gradient(135deg, #69c8f2, #1b8adb); }
        .ball-red { background: linear-gradient(135deg, #ff7272, #d93d3d); }
        .ball-gray { background: linear-gradient(135deg, #aaaaaa, #777777); }
        .ball-green { background: linear-gradient(135deg, #b0d840, #7caf1a); }

        .lotto-plus {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-sub);
        }

        .winners-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border-color);
            color: #f0f0f0;
            font-size: 13px;
        }

        .winners-status span {
            white-space: nowrap;
        }

        /* CTA BUTTON */
        .btn-cta {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--gold-gradient);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulse 2s infinite;
        }

        .btn-cta:hover, .btn-cta:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.6);
            animation: none;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom); /* For iOS handle */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-sub);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--gold-light);
        }

        .nav-icon {
            font-size: 24px;
        }
        
        .nav-text {
            font-size: 11px;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); }
        }

        /* Responsive Tweaks for Tiny Screens (e.g. 360px wide or less) */
        @media screen and (max-width: 360px) {
            .app-container {
                padding-bottom: 20px;
            }
            .header { padding: 16px 16px; }
            .main-content { padding: 10px 16px 90px; }
            .prize-amount { font-size: 32px; }
            .lotto-ball { width: 32px; height: 32px; font-size: 14px; }
            .time-val { width: 38px; height: 42px; font-size: 18px; }
            .btn-cta { padding: 15px; font-size: 16px; }
            .bottom-nav { height: 60px; }
            .nav-icon { font-size: 20px; }
            .winners-status { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <header class="header">
            <div class="header-logo">나눔로또</div>
            <div class="header-points">
                <span>P</span> 2,500
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Hero Card (Current Round) -->
            <section class="hero-card">
                <div class="round-badge">제 1104회차 예상</div>
                <h2 class="hero-title">1등 예상 누적 당첨금</h2>
                <div class="prize-amount">₩ 2,450,000,000</div>
                
                <div class="countdown-wrapper">
                    <div class="countdown-label">추첨일(토요일 저녁 8시)까지 남은 시간</div>
                    <div class="countdown-timer">
                        <div class="time-box">
                            <div class="time-val" id="cd-days">03</div>
                            <div class="time-unit">일</div>
                        </div>
                        <div class="time-box">
                            <div class="time-val" id="cd-hours">14</div>
                            <div class="time-unit">시간</div>
                        </div>
                        <div class="time-box">
                            <div class="time-val" id="cd-mins">25</div>
                            <div class="time-unit">분</div>
                        </div>
                        <div class="time-box">
                            <div class="time-val" id="cd-secs">30</div>
                            <div class="time-unit">초</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Previous Round Results -->
            <h3 class="section-title">
                지난주 나눔 로또 당첨 현황
                <span id="latest-round-text">1103회차</span>
            </h3>
            <section class="prev-result-card">
                <div class="ball-row" id="latest-balls-row">
                    <!-- Ball colors based on number: 1-10 yellow, 11-20 blue, 21-30 red, 31-40 gray, 41-45 green -->
                    <div class="lotto-ball ball-yellow">7</div>
                    <div class="lotto-ball ball-blue">15</div>
                    <div class="lotto-ball ball-red">23</div>
                    <div class="lotto-ball ball-gray">33</div>
                    <div class="lotto-ball ball-gray">38</div>
                    <div class="lotto-ball ball-green">42</div>
                    <div class="lotto-plus">+</div>
                    <div class="lotto-ball ball-blue" style="box-shadow: 0 0 10px rgba(255,215,0,0.5); border: 2px solid #FFD700;">11</div> <!-- Bonus Ball -->
                </div>
                <div class="winners-status">
                    <span>1등: 10명</span>
                    <span>2등: 50명</span>
                    <span>3등: 100명</span>
                    <span>4등: 1,500명</span>
                    <span>5등: 5,700명</span>
                </div>
            </section>

            <!-- Call to Action -->
            <button class="btn-action primary btn-cta" style="width: 100%; border-radius: 14px;" onclick="location.href='list.html'">
                🎯 무료 로또 번호 획득하기
            </button>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <div class="nav-icon">🏠</div>
                <span class="nav-text">홈</span>
            </a>
            <a href="list.html" class="nav-item">
                <div class="nav-icon">📺</div>
                <span class="nav-text">나눔로또</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <div class="nav-icon">👤</div>
                <span class="nav-text">마이페이지</span>
            </a>
        </nav>

    </div>

    <script>
        // Countdown Timer Logic
        function updateCountdown() {
            // Target: Next Saturday 20:00:00 KST
            const now = new Date();
            let target = new Date();
            target.setDate(now.getDate() + (6 - now.getDay())); // Set to Saturday
            target.setHours(20, 0, 0, 0);

            // If it's Saturday after 20:00, set to next Saturday (this depends on real logic, simplified here)
            if (now.getDay() === 6 && now.getHours() >= 20) {
                target.setDate(target.getDate() + 7);
            }

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('cd-days').innerText = '00';
                document.getElementById('cd-hours').innerText = '00';
                document.getElementById('cd-mins').innerText = '00';
                document.getElementById('cd-secs').innerText = '00';
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // Format with leading zero
            document.getElementById('cd-days').innerText = d.toString().padStart(2, '0');
            document.getElementById('cd-hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('cd-mins').innerText = m.toString().padStart(2, '0');
            document.getElementById('cd-secs').innerText = s.toString().padStart(2, '0');
        }

        // Initialize and interval
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // --- Lotto API Fetch Logic ---
        function getBallColorClass(num) {
            if (num <= 10) return 'ball-yellow';
            if (num <= 20) return 'ball-blue';
            if (num <= 30) return 'ball-red';
            if (num <= 40) return 'ball-gray';
            return 'ball-green';
        }

        async function updateLatestLotto() {
            // Find current latest draw round
            const firstDraw = new Date('2002-12-07T20:45:00+09:00').getTime();
            const now = new Date().getTime();
            let expectedDrwNo = Math.floor((now - firstDraw) / (1000 * 60 * 60 * 24 * 7)) + 1;

            let result = null;
            try {
                let res = await fetch(`https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${expectedDrwNo}`);
                if (!res.ok) throw new Error("CORS or Network Error");
                let data = await res.json();
                if (data.returnValue === 'success') {
                    result = data;
                } else {
                    // Try previous round if current is not yet drawn
                    expectedDrwNo--;
                    res = await fetch(`https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${expectedDrwNo}`);
                    data = await res.json();
                    if (data.returnValue === 'success') {
                        result = data;
                    } else throw new Error("API Fail");
                }
            } catch (e) {
                console.warn(`[동행복권 API] 브라우저 CORS 정책 또는 네트워크 오류로 임의 데이터로 대체합니다 (요청회차: ${expectedDrwNo})`, e);
                // Dummy Data Fallback mapping
                result = {
                    drwNo: expectedDrwNo,
                    drwtNo1: 7, drwtNo2: 15, drwtNo3: 23, drwtNo4: 33, drwtNo5: 38, drwtNo6: 42,
                    bnusNo: 11
                };
            }

            if(result) {
                // Update text
                const roundTextEl = document.getElementById('latest-round-text');
                if(roundTextEl) roundTextEl.innerText = `${result.drwNo}회차`;
                
                // Update balls
                const row = document.getElementById('latest-balls-row');
                if(row) {
                    row.innerHTML = '';
                    const nums = [result.drwtNo1, result.drwtNo2, result.drwtNo3, result.drwtNo4, result.drwtNo5, result.drwtNo6];
                    nums.forEach(n => {
                        const div = document.createElement('div');
                        div.className = `lotto-ball ${getBallColorClass(n)}`;
                        div.innerText = n;
                        row.appendChild(div);
                    });

                    const plus = document.createElement('div');
                    plus.className = 'lotto-plus';
                    plus.innerText = '+';
                    row.appendChild(plus);

                    const bonus = document.createElement('div');
                    bonus.className = `lotto-ball ${getBallColorClass(result.bnusNo)}`;
                    bonus.style.boxShadow = '0 0 10px rgba(255,215,0,0.5)';
                    bonus.style.border = '2px solid #FFD700';
                    bonus.innerText = result.bnusNo;
                    row.appendChild(bonus);
                }
            }
        }
        
        // Execute on load
        updateLatestLotto();
    </script>
</body>
</html>
