<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>행운나눔 - 매일 터지는 행복</title>
    
    <!-- 디자인을 위한 테일윈드 CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 리액트 및 바벨 라이브러리 로드 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 프리텐다드 서체 적용 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #DDE2E5;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 모바일 웹 스크롤바 숨기기 (앱 느낌 강조) */
        ::-webkit-scrollbar { display: none; }
        
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 별 반짝임 애니메이션 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .star-animate {
            animation: twinkle 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 아이콘 및 장식 컴포넌트 ---
        const 아이콘 = {
            별: (props) => (
                <svg width={props.size || "24"} height={props.size || "24"} viewBox="0 0 24 24" fill="currentColor" className={props.className}>
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
            ),
            꽃: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 16.5A4.5 4.5 0 1 1 7.5 12 4.5 4.5 0 1 1 12 7.5 4.5 4.5 0 1 1 16.5 12 4.5 4.5 0 1 1 12 16.5"/><path d="M12 7.5V2"/><path d="M12 22v-5.5"/><path d="M16.5 12H22"/><path d="M2 12h5.5"/></svg>,
            종: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
            집: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            티켓: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/></svg>,
            달력: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            사람: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            재생: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>,
            지갑: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H4a2 2 0 0 0 0 4h15a1 1 0 0 0 1-1v-4"/></svg>,
            화살표: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        };

        function App() {
            const [currentScreen, setCurrentScreen] = useState('login');
            const [activeTab, setActiveTab] = useState('첫화면');
            const [points, setPoints] = useState(1284500); 
            const [tickets, setTickets] = useState([
                { id: 1, numbers: [7, 14, 22, 31, 38, 45], source: '반가운 첫 가입 선물 🎁', date: '2026-02-24' }
            ]);
            
            const [isAdWatching, setIsAdWatching] = useState(false);
            const [adProgress, setAdProgress] = useState(0);
            const [showRewardModal, setShowRewardModal] = useState(false);

            // 광고 시청 로직
            const handleAdStart = () => {
                setIsAdWatching(true);
                setAdProgress(0);
                let p = 0;
                const timer = setInterval(() => {
                    p += 5;
                    setAdProgress(p);
                    if (p >= 100) {
                        clearInterval(timer);
                        setTimeout(() => {
                            setIsAdWatching(false);
                            행운권추가('정성 가득 광고 시청 📺');
                            setShowRewardModal(true);
                        }, 400);
                    }
                }, 120);
            };

            const 행운권추가 = (src) => {
                const nums = Array.from({length: 6}, () => Math.floor(Math.random() * 45) + 1).sort((a,b)=>a-b);
                setTickets(prev => [{ id: Date.now() + Math.random(), numbers: nums, source: src, date: '2026-02-24' }, ...prev]);
            };

            const handleBookingComplete = () => {
                for(let i=0; i<5; i++) 행운권추가('안산 본점 방문 보상 🎁');
                setActiveTab('행운함');
            };

            // 메인 렌더링 스위치
            const renderScreen = () => {
                if (currentScreen === 'login') {
                    return (
                        <div className="h-full flex flex-col items-center justify-between bg-gradient-to-b from-[#4A59E9] to-[#2E3AC7] p-10 relative overflow-hidden text-center">
                            {/* 별 장식 재현 */}
                            <div className="mt-20 z-10 flex flex-col items-center">
                                <div className="relative mb-8 flex gap-2 justify-center">
                                    <아이콘.별 size="40" className="text-yellow-300 star-animate" />
                                    <아이콘.별 size="56" className="text-yellow-400 star-animate -mt-6" />
                                    <아이콘.별 size="32" className="text-yellow-200 star-animate" />
                                </div>
                                <h1 className="text-5xl font-extrabold tracking-tight mb-3 text-white">무료로또</h1>
                                <p className="text-blue-100 text-lg font-medium opacity-90">매일 터지는 100% 당첨 행운 ✨</p>
                            </div>

                            <div className="w-full space-y-4 z-10 mb-14">
                                <SocialButton type="구글" onClick={() => setCurrentScreen('main')} />
                                <SocialButton type="카카오" onClick={() => setCurrentScreen('main')} />
                                <SocialButton type="네이버" onClick={() => setCurrentScreen('main')} />
                                <p className="text-[12px] text-blue-100/60 mt-8 leading-relaxed">
                                    로그인 시 이용약관 및 <br/>개인정보처리방침에 동의하게 됩니다.
                                </p>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="flex flex-col h-full bg-[#FCFAF5] text-[#2D3436] relative overflow-hidden font-sans">
                        {/* 상단 헤더 */}
                        <header className="px-6 py-6 flex justify-between items-center z-50 bg-white border-b border-gray-100 shadow-sm shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-[#2D5A27] to-[#1E3A1A] rounded-xl flex items-center justify-center shadow-lg">
                                    <아이콘.꽃 />
                                </div>
                                <span className="font-bold text-2xl tracking-tight text-[#2D5A27]">행운나눔 ✨</span>
                            </div>
                            <div className="flex items-center gap-4 text-gray-400">
                                <아이콘.종 />
                                <div className="w-10 h-10 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center overflow-hidden">
                                    <아이콘.사람 />
                                </div>
                            </div>
                        </header>

                        {/* 본문 영역 */}
                        <main className="flex-1 overflow-y-auto pb-32 z-10 custom-scrollbar">
                            {activeTab === '첫화면' && <HomeTab onWatchAd={handleAdStart} />}
                            {activeTab === '행운함' && <WalletTab tickets={tickets} points={points} />}
                            {activeTab === '방문예약' && <BookingTab onBook={handleBookingComplete} />}
                            {activeTab === '정보' && <InfoTab />}
                        </main>

                        {/* 하단 내비게이션 */}
                        <nav className="absolute bottom-6 left-1/2 -translate-x-1/2 w-[92%] h-20 bg-white border border-gray-100 rounded-[28px] flex justify-around items-center z-50 shadow-[0_15px_35px_rgba(0,0,0,0.06)]">
                            <NavBtn icon={<아이콘.집 />} label="첫화면" active={activeTab === '첫화면'} onClick={() => setActiveTab('첫화면')} />
                            <NavBtn icon={<아이콘.티켓 />} label="행운함" active={activeTab === '행운함'} onClick={() => setActiveTab('행운함')} badge={tickets.length} />
                            <NavBtn icon={<아이콘.달력 />} label="방문예약" active={activeTab === '방문예약'} onClick={() => setActiveTab('방문예약')} />
                            <NavBtn icon={<아이콘.사람 />} label="내정보" active={activeTab === '정보'} onClick={() => setActiveTab('정보')} />
                        </nav>

                        {/* 오버레이 화면들 */}
                        {isAdWatching && <AdPlayer progress={adProgress} />}
                        {showRewardModal && (
                            <RewardModal 
                                onClose={() => setShowRewardModal(false)} 
                                onGoBooking={() => { setShowRewardModal(false); setActiveTab('방문예약'); }} 
                            />
                        )}
                    </div>
                );
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-[#DDE2E5]">
                    <div className="w-full max-w-md bg-white sm:rounded-[40px] overflow-hidden shadow-2xl sm:border-[8px] border-white h-screen sm:h-[850px] relative">
                        {renderScreen()}
                    </div>
                </div>
            );
        }

        // --- 서브 컴포넌트들 ---

        const SocialButton = ({ type, onClick }) => {
            const config = {
                카카오: { 
                    bg: 'bg-[#FEE500]', 
                    text: 'text-[#3C1E1E]', 
                    name: '카카오로 시작하기',
                    icon: (
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" className="mr-3">
                            <path d="M12 3c-5.523 0-10 3.535-10 7.896 0 2.822 1.838 5.305 4.603 6.643-.298 1.108-1.077 4.155-1.107 4.293-.038.172.062.164.128.12.086-.057 4.12-2.828 5.756-3.957.524.076 1.066.117 1.62.117 5.523 0 10-3.535 10-7.896C22 6.535 17.523 3 12 3z"/>
                        </svg>
                    )
                },
                네이버: { 
                    bg: 'bg-[#03C75A]', 
                    text: 'text-white', 
                    name: '네이버로 시작하기',
                    icon: (
                        <div className="bg-white text-[#03C75A] font-black w-5 h-5 rounded-sm flex items-center justify-center text-[12px] mr-3">N</div>
                    )
                },
                구글: { 
                    bg: 'bg-white', 
                    text: 'text-gray-700', 
                    name: '구글로 시작하기',
                    icon: (
                        <svg viewBox="0 0 24 24" width="20" height="20" className="mr-3">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    )
                }
            };
            const s = config[type];
            return (
                <button onClick={onClick} className={`w-full ${s.bg} ${s.text} h-[62px] rounded-2xl flex items-center justify-center font-bold text-lg active:scale-[0.97] transition-all shadow-md`}>
                    {s.icon}
                    {s.name}
                </button>
            );
        };

        const HomeTab = ({ onWatchAd }) => (
            <div className="p-6 space-y-8 text-left animate-in fade-in duration-700">
                <div className="relative">
                    <div className="bg-white border border-gray-100 rounded-[36px] p-8 text-center shadow-[0_10px_25px_rgba(0,0,0,0.03)] overflow-hidden">
                        <div className="absolute top-0 right-0 w-24 h-24 bg-amber-50 rounded-full -mr-10 -mt-10 opacity-50"></div>
                        <p className="text-[13px] text-[#2D5A27] font-bold tracking-[0.3em] mb-4 flex items-center justify-center gap-2">
                             🏆 이번 주 행운 나눔액 
                        </p>
                        <h2 className="text-4xl font-black text-gray-900 tracking-tight mb-5">
                            <span className="text-xl text-gray-400 mr-1 font-normal">원</span>
                            12,500,000,000
                        </h2>
                        <div className="inline-flex items-center gap-2 bg-[#F9F7F2] border border-[#2D5A27]/10 px-6 py-2.5 rounded-full shadow-inner">
                            <span className="text-sm font-bold text-[#2D5A27] font-mono">마감까지: 02일 14:30 ⏳</span>
                        </div>
                    </div>
                </div>

                <div className="relative overflow-hidden rounded-[32px] bg-gradient-to-br from-[#2D5A27] to-[#1E3A1A] p-8 flex items-center justify-between shadow-xl cursor-pointer active:scale-[0.97] transition-all">
                    <div className="space-y-3 z-10">
                        <span className="text-[11px] font-black text-amber-200 tracking-widest uppercase block">⭐ 특별 나눔</span>
                        <h3 className="text-2xl font-bold text-white leading-tight text-left">안산 직영본점 <br/>방문 예약하기 🏠</h3>
                        <p className="text-sm text-white/80 font-medium">지금 예약하면 행운권 5장 더! 🎁</p>
                    </div>
                    <div className="w-20 h-20 bg-white/10 rounded-3xl flex items-center justify-center border border-white/20 z-10 backdrop-blur-sm">
                        <아이콘.별 size="40" className="text-amber-300" />
                    </div>
                </div>

                <div className="space-y-4">
                    <h3 className="text-lg font-bold text-gray-800 px-1">오늘의 행운 모으기 🌟</h3>
                    <button onClick={onWatchAd} className="w-full bg-white border border-gray-100 p-6 rounded-[28px] flex items-center justify-between active:scale-[0.98] transition-all hover:border-[#2D5A27]/20 shadow-sm">
                        <div className="flex items-center gap-5">
                            <div className="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center">
                                <아이콘.재생 />
                            </div>
                            <div className="text-left">
                                <span className="text-[10px] text-amber-600 font-black uppercase tracking-wider mb-1 block">추천 영상</span>
                                <span className="text-lg font-bold text-gray-700">활기찬 하루를 위한 영상 📺</span>
                            </div>
                        </div>
                        <span className="text-[#2D5A27] font-black text-lg">+1장</span>
                    </button>
                    <button onClick={onWatchAd} className="w-full bg-white border border-gray-100 p-6 rounded-[28px] flex items-center justify-between active:scale-[0.98] transition-all hover:border-[#2D5A27]/20 shadow-sm">
                        <div className="flex items-center gap-5">
                            <div className="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center">
                                <아이콘.재생 />
                            </div>
                            <div className="text-left">
                                <span className="text-[10px] text-amber-600 font-black uppercase tracking-wider mb-1 block">인기 광고</span>
                                <span className="text-lg font-bold text-gray-700">고급 정원 가꾸기 소개 🌻</span>
                            </div>
                        </div>
                        <span className="text-[#2D5A27] font-black text-lg">+1장</span>
                    </button>
                </div>
            </div>
        );

        const WalletTab = ({ tickets, points }) => (
            <div className="p-6 space-y-8 text-left animate-in slide-in-from-bottom-5 duration-700">
                <div className="bg-white p-10 rounded-[40px] border border-gray-100 text-center shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-gray-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
                    <div className="flex justify-center mb-4 text-[#2D5A27]"><아이콘.지갑 /></div>
                    <p className="text-sm text-gray-500 font-bold mb-1">내 지갑에 담긴 행복 👛</p>
                    <h2 className="text-4xl font-bold text-gray-900 mb-8 tracking-tight">
                        {points.toLocaleString()} <span className="text-xl font-normal text-gray-400">원</span>
                    </h2>
                    <button className="w-full h-16 bg-gradient-to-r from-[#2D5A27] to-[#1E3A1A] text-white font-bold text-lg rounded-2xl active:scale-95 transition-transform shadow-lg">
                        내 계좌로 바로 받기 🏦
                    </button>
                </div>

                <div>
                    <h3 className="text-lg font-bold text-gray-800 mb-5 px-1 flex items-center justify-between">
                        내가 모은 행운권 <span className="text-[#2D5A27] bg-[#2D5A27]/5 px-3 py-0.5 rounded-full text-sm font-black">{tickets.length}장 🎫</span>
                    </h3>
                    <div className="space-y-4">
                        {tickets.map(t => (
                            <div key={t.id} className="bg-white border border-gray-100 rounded-[32px] p-7 shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-[12px] font-bold text-[#2D5A27] bg-[#F9F7F2] px-3 py-1 rounded-full border border-[#2D5A27]/10">{t.source}</span>
                                    <span className="text-[12px] text-gray-400 font-mono">{t.date}</span>
                                </div>
                                <div className="flex justify-between px-2">
                                    {t.numbers.map((n, idx) => (
                                        <div key={idx} className="w-11 h-11 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center text-sm font-black text-gray-700 shadow-inner">
                                            {n}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const BookingTab = ({ onBook }) => (
            <div className="h-full flex flex-col text-left animate-in fade-in duration-700">
                <div className="relative h-[280px] shrink-0 bg-[#2D5A27] flex items-end p-8 overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-t from-[#2D5A27] to-transparent z-10"></div>
                    <div className="relative z-20 w-full">
                        <span className="text-[12px] text-white/80 font-bold tracking-[0.2em] block mb-2 underline underline-offset-4">공식 직영본점 ✅</span>
                        <h2 className="text-4xl font-bold text-white tracking-tight">안산 본점 🏠</h2>
                        <p className="text-sm text-white/70 flex items-center gap-1 mt-2 font-medium">경기도 안산시 상록구 광덕대로</p>
                    </div>
                </div>
                <div className="px-8 flex-1 pb-36 pt-10">
                    <div className="bg-[#F9F7F2] border border-amber-100 rounded-[32px] p-7 mb-10 flex gap-5 items-center shadow-sm">
                        <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-amber-100 text-xl text-amber-500">✨</div>
                        <div className="text-[15px] leading-relaxed text-gray-600 font-medium">
                            본점 방문 시니어 고객님께 <br/> <span className="text-[#2D5A27] font-bold underline text-lg">무료 행운권 5장</span>을 선물합니다 🎁
                        </div>
                    </div>
                    <div className="space-y-8">
                        <div>
                            <h4 className="text-[12px] text-gray-400 font-black mb-4 uppercase tracking-widest text-left">방문 예정일 📅</h4>
                            <div className="bg-white border border-gray-100 p-5 rounded-2xl text-center text-lg font-bold text-gray-800 shadow-sm text-left">2026년 2월 26일 (목)</div>
                        </div>
                        <div className="grid grid-cols-3 gap-4">
                            {['오전 11시', '오후 2시', '오후 4시'].map(t => (
                                <button key={t} className="py-4 rounded-xl border border-gray-100 bg-white text-xs font-bold text-gray-500 hover:border-[#2D5A27] hover:text-[#2D5A27] transition-all shadow-sm">{t}</button>
                            ))}
                        </div>
                    </div>
                </div>
                <div className="absolute bottom-32 left-8 right-8">
                    <button onClick={onBook} className="w-full h-20 bg-gradient-to-r from-[#2D5A27] to-[#1E3A1A] text-white font-bold text-xl rounded-[24px] shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                         방문 예약 확정하기 ✅
                    </button>
                </div>
            </div>
        );

        const InfoTab = () => (
            <div className="p-8 space-y-12 text-center animate-in fade-in duration-500">
                <div className="flex flex-col items-center">
                    <div className="w-28 h-28 rounded-[40px] bg-white border border-gray-100 flex items-center justify-center mb-6 shadow-xl relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-br from-[#F9F7F2] to-transparent opacity-50"></div>
                        <div className="text-[#2D5A27]"><아이콘.사람 /></div>
                    </div>
                    <h2 className="text-2xl font-bold text-gray-900 tracking-tight">홍길동 회원님 👤</h2>
                    <p className="text-sm text-gray-400 font-medium mt-1">인증 회원 | 가입일 2026.02.24</p>
                </div>
                <div className="space-y-3">
                    <MenuRow label="본인 인증 정보 관리 🛡️" />
                    <MenuRow label="당첨금 출금 계좌 설정 🏦" />
                    <MenuRow label="행운나눔 알림 설정 🔔" />
                    <MenuRow label="로그아웃 🚪" danger />
                </div>
            </div>
        );

        const MenuRow = ({ label, danger }) => (
            <div className="flex items-center justify-between p-6 rounded-2xl bg-white border border-gray-50 active:scale-[0.98] transition-all hover:border-[#2D5A27]/10 shadow-sm cursor-pointer">
                <span className={`text-[16px] font-bold ${danger ? 'text-red-400' : 'text-gray-600'}`}>{label}</span>
                <아이콘.화살표 />
            </div>
        );

        const NavBtn = ({ icon, label, active, onClick, badge }) => (
            <button onClick={onClick} className="relative flex flex-col items-center justify-center h-full w-20 group">
                <div className={`transition-all duration-300 ${active ? 'text-[#2D5A27] scale-110' : 'text-gray-300'}`}>
                    {React.cloneElement(icon, { className: `w-7 h-7 ${active ? 'stroke-[2.5px]' : 'stroke-[2px]'}` })}
                </div>
                <span className={`text-[11px] mt-1.5 font-bold ${active ? 'text-[#2D5A27]' : 'text-gray-400'}`}>{label}</span>
                {badge && <span className="absolute top-3 right-3 w-5 h-5 bg-[#2D5A27] text-[10px] font-bold text-white flex items-center justify-center rounded-full border-2 border-white">{badge}</span>}
            </button>
        );

        const AdPlayer = ({ progress }) => (
            <div className="absolute inset-0 z-[100] bg-white p-10 flex flex-col justify-center items-center text-center">
                <div className="text-[#2D5A27] mb-6 animate-pulse"><아이콘.꽃 /></div>
                <p className="text-2xl font-bold text-[#2D5A27] mb-2 italic tracking-tighter">정성을 모으는 중 ⏳</p>
                <p className="text-sm text-gray-400 mb-14 leading-relaxed font-medium">잠시만 기다려 주세요.<br/>행복이 차곡차곡 쌓이고 있습니다. ✨</p>
                <div className="w-full aspect-video bg-gray-50 border border-gray-100 rounded-[36px] flex items-center justify-center relative overflow-hidden shadow-inner mb-14 text-gray-100">
                    <아이콘.재생 />
                </div>
                <div className="w-full max-w-[280px]">
                    <div className="flex justify-between text-[11px] text-gray-400 font-bold mb-3 tracking-widest">
                        <span>진행률</span>
                        <span>{progress}%</span>
                    </div>
                    <div className="h-3 w-full bg-gray-50 rounded-full overflow-hidden shadow-inner border border-gray-100">
                        <div className="h-full bg-gradient-to-r from-[#2D5A27] to-[#1E3A1A] transition-all duration-300" style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            </div>
        );

        const RewardModal = ({ onClose, onGoBooking }) => (
            <div className="absolute inset-0 z-[200] bg-black/50 backdrop-blur-sm flex items-center justify-center p-8 animate-in fade-in duration-300">
                <div className="w-full max-w-sm bg-white rounded-[48px] p-10 text-center relative shadow-2xl">
                    <div className="w-20 h-20 bg-[#F9F7F2] rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl">🎫</div>
                    <h2 className="text-3xl font-bold text-gray-900 mb-2 italic tracking-tighter uppercase">Granted!</h2>
                    <p className="text-gray-500 text-[15px] mb-10 leading-relaxed font-medium italic text-left">행운권 1장이 도착했습니다. 🎫</p>
                    <div onClick={onGoBooking} className="relative bg-[#F9F7F2] border border-amber-100 rounded-[36px] p-7 text-left cursor-pointer active:scale-95 transition-all shadow-sm group">
                        <span className="text-[12px] text-amber-600 font-black mb-1 block uppercase tracking-widest">깜짝 혜택 🎁</span>
                        <h3 className="text-lg font-bold text-gray-900 leading-tight mb-4">안산 본점 예약 시 <br/><span className="text-[#2D5A27] underline">행운권 5장</span> 더 받기 🎫</h3>
                        <div className="text-[12px] text-gray-400 font-bold flex items-center gap-1">지금 예약하러 가기 <아이콘.화살표 /></div>
                    </div>
                    <button onClick={onClose} className="mt-10 text-sm font-bold text-gray-300 hover:text-gray-900 transition-colors tracking-widest uppercase">닫기</button>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
